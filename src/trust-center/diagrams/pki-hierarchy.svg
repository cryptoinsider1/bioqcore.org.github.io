<svg width="500" height="480" xmlns="http://www.w3.org/2000/svg" font-family="Inter" font-size="14">
  <rect width="500" height="480" fill="#ffffff"/>

  <!-- Root -->
  <rect x="150" y="20" width="200" height="80" rx="10" fill="#f3f3f3" stroke="#444"/>
  <text x="250" y="55" text-anchor="middle" font-weight="bold">ROOT CA</text>
  <text x="250" y="75" text-anchor="middle">Offline · Raspberry Pi</text>

  <!-- Intermediate -->
  <rect x="150" y="140" width="200" height="80" rx="10" fill="#f3f3f3" stroke="#444"/>
  <text x="250" y="175" text-anchor="middle" font-weight="bold">INTERMEDIATE CA</text>
  <text x="250" y="195" text-anchor="middle">Trust Center</text>

  <!-- Issuing -->
  <rect x="150" y="260" width="200" height="80" rx="10" fill="#f3f3f3" stroke="#444"/>
  <text x="250" y="295" text-anchor="middle" font-weight="bold">ISSUING CA</text>
  <text x="250" y="315" text-anchor="middle">CRL + OCSP</text>

  <!-- Arrows -->
  <line x1="250" y1="100" x2="250" y2="140" stroke="#444" marker-end="url(#arrow)"/>
  <line x1="250" y1="220" x2="250" y2="260" stroke="#444" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>
</svg>
