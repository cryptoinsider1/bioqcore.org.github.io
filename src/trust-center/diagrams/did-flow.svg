<svg width="880" height="300" xmlns="http://www.w3.org/2000/svg" font-family="Inter" font-size="13">
  <rect width="880" height="300" fill="#ffffff"/>

  <!-- Client -->
  <rect x="40" y="60" width="180" height="120" rx="8" fill="#eef7ff" stroke="#333"/>
  <text x="130" y="95" font-weight="bold" text-anchor="middle">CLIENT</text>
  <text x="130" y="115" text-anchor="middle">iOS App / Web</text>

  <!-- API -->
  <rect x="350" y="60" width="180" height="120" rx="8" fill="#f8f8f8" stroke="#333"/>
  <text x="440" y="95" font-weight="bold" text-anchor="middle">TRUST CENTER API</text>
  <text x="440" y="115" text-anchor="middle">GraphQL / REST</text>

  <!-- Registry -->
  <rect x="650" y="60" width="180" height="120" rx="8" fill="#f3fff2" stroke="#333"/>
  <text x="740" y="95" font-weight="bold" text-anchor="middle">DID REGISTRY</text>
  <text x="740" y="115" text-anchor="middle">resolve / update</text>

  <!-- Arrows -->
  <line x1="220" y1="120" x2="350" y2="120" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="530" y1="120" x2="650" y2="120" stroke="#333" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>
</svg>
