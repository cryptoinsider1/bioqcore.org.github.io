<svg width="880" height="520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial" font-size="14">
  <rect width="880" height="520" fill="#ffffff"/>
  
  <!-- Root -->
  <rect x="40" y="40" width="260" height="120" rx="10" fill="#f4f4f8" stroke="#333"/>
  <text x="170" y="70" text-anchor="middle" font-weight="bold">ROOT LAYER</text>
  <text x="170" y="95" text-anchor="middle">Offline Root CA</text>
  <text x="170" y="115" text-anchor="middle">Raspberry Pi + Encrypted SSD</text>

  <!-- Intermediate -->
  <rect x="320" y="40" width="260" height="120" rx="10" fill="#f4f4f8" stroke="#333"/>
  <text x="450" y="70" text-anchor="middle" font-weight="bold">TRUST CENTER</text>
  <text x="450" y="95" text-anchor="middle">Intermediate CA</text>
  <text x="450" y="115" text-anchor="middle">GraphQL / REST API</text>

  <!-- Issuing -->
  <rect x="600" y="40" width="240" height="120" rx="10" fill="#f4f4f8" stroke="#333"/>
  <text x="720" y="70" text-anchor="middle" font-weight="bold">ISSUING LAYER</text>
  <text x="720" y="95" text-anchor="middle">Issuing CA</text>
  <text x="720" y="115" text-anchor="middle">CRL · OCSP</text>

  <!-- Edges -->
  <rect x="40" y="220" width="240" height="140" rx="10" fill="#eef6ff" stroke="#333"/>
  <text x="160" y="250" text-anchor="middle" font-weight="bold">EDGE</text>
  <text x="160" y="275" text-anchor="middle">MikroTik BR5009</text>
  <text x="160" y="295" text-anchor="middle">VPN · mTLS Gate</text>

  <!-- Mobile -->
  <rect x="330" y="220" width="240" height="140" rx="10" fill="#eef6ff" stroke="#333"/>
  <text x="450" y="250" text-anchor="middle" font-weight="bold">MOBILE / AGENT</text>
  <text x="450" y="275" text-anchor="middle">iOS BioQCore App</text>
  <text x="450" y="295" text-anchor="middle">DID Wallet</text>

  <!-- Web -->
  <rect x="620" y="220" width="220" height="140" rx="10" fill="#eef6ff" stroke="#333"/>
  <text x="730" y="250" text-anchor="middle" font-weight="bold">WEB CLIENTS</text>
  <text x="730" y="275" text-anchor="middle">bioqcore.org</text>

  <!-- Arrows -->
  <line x1="300" y1="100" x2="320" y2="100" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="580" y1="100" x2="600" y2="100" stroke="#333" marker-end="url(#arrow)"/>

  <line x1="160" y1="220" x2="160" y2="160" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="450" y1="220" x2="450" y2="160" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="730" y1="220" x2="730" y2="160" stroke="#333" marker-end="url(#arrow)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>
</svg>
