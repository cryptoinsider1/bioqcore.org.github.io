name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'

permissions:
  issues: write
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'https://bioqcore.org'
          fail_action: false  # Set to true after fixing critical issues
          rules_file_name: '.zap-rules.tsv'
          cmd_options: '-a'
          
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.md
          
      - name: Parse and Report ZAP Results
        run: |
          # Count critical and high alerts
          ALERT_COUNT=$(grep -c "High\|Medium" zap-report.md || true)
          if [ "$ALERT_COUNT" -gt "5" ]; then
            echo "Too many security alerts: $ALERT_COUNT"
            exit 1
          fi
          
      - name: Notify on Failure
        if: ${{ failure() }}
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Security Scan Results - Action Required',
              body: `ZAP scan completed with findings. Please check the uploaded report.`
            });
