name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'

permissions:
  issues: write
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'https://bioqcore.org'
          fail_action: false
          rules_file_name: '.zap-rules.tsv'
          cmd_options: '-a'
          
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.md
          
      - name: Analyze Results
        run: |
          # Считаем только критические и высокоуровневые предупреждения
          CRITICAL_COUNT=$(grep -c "High" zap-report.md || true)
          MEDIUM_COUNT=$(grep -c "Medium" zap-report.md || true)
          
          echo "Found $CRITICAL_COUNT critical and $MEDIUM_COUNT medium alerts"
          
          # Если есть критические проблемы - падаем
          if [ "$CRITICAL_COUNT" -gt "0" ]; then
            echo "Critical vulnerabilities found!"
            exit 1
          fi
          
          # Для medium предупреждений более мягкая проверка
          if [ "$MEDIUM_COUNT" -gt "5" ]; then
            echo "Too many medium risk vulnerabilities"
            exit 1
          fi
          
      - name: Notify on Failure
        if: ${{ failure() }}
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Security Scan Completed with Findings',
              body: `ZAP scan completed. Please check the uploaded report for details.`
            });