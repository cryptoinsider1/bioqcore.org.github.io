name: HTML Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  html-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validator
        run: sudo npm install -g html-validate

      - name: Run HTML validation
        run: html-validate "**/*.html" --config .htmlvalidate.json
